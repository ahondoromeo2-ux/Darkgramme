
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darkgramme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-nav">
        <h1 class="logo">Darkgramme</h1>
        <div class="top-icons">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-brands fa-facebook-messenger"></i>
        </div>
    </header>

    <main id="main-content">
        <div class="welcome-message">
            <h2>Bienvenue sur Darkgramme</h2>
            <p>Chargement du flux...</p>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active"><i class="fa-solid fa-house"></i></button>
        <button class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="nav-item"><i class="fa-regular fa-square-plus"></i></button>
        <button class="nav-item"><i class="fa-solid fa-clapperboard"></i></button>
        <button class="nav-item profile-icon"><i class="fa-solid fa-circle-user"></i></button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
